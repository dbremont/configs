# Kitty configuration file

# Scrollback (important for debugging)
scrollback_lines 100000
scrollback_pager less --RAW-CONTROL-CHARS --chop-long-lines --quit-if-one-screen

# -----------------------------
# 🎨 Appearance
# -----------------------------

font_family FiraCode Nerd Font
bold_font auto
italic_font auto
font_size 12.0

# Layout (Full screen, Tiled, Stacked)
map f11 toggle_layout stack

# Navigation
map ctrl+shift+h neighboring_window left
map ctrl+shift+l neighboring_window right
map ctrl+shift+k neighboring_window up
map ctrl+shift+j neighboring_window down

# Resize (precise control)
map ctrl+shift+left  resize_window narrower 5
map ctrl+shift+right resize_window wider 5
map ctrl+shift+up    resize_window taller 5
map ctrl+shift+down  resize_window shorter 5

# -----------------------------
# 📑 Tabs
# -----------------------------

map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
# map ctrl+tab+right next_tab
# map ctrl+tab+left previous_tab