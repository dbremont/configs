# --------------------------------------------------------------------
# Annotation Policy
#
# BLOCK  : Prevents commit.
# WARN   : Reports a warning but allows commit.
# INFO   : Informational only.
# --------------------------------------------------------------------

BLOCK="@FIXME @QUESTION @VERIFY"
WARN="@TODO @HACK @WORKAROUND"
INFO="@TECH-DEBT @REFACTOR @OPTIMIZE @RATIONALE @NOTE"

